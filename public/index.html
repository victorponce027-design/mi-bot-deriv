<!DOCTYPE html>
<html>
<head>
    <title>Bot Deriv Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial; background: #0a0e27; color: white; padding: 20px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: #1a1f3a; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        input, select, button { padding: 12px; margin: 8px 5px; border-radius: 8px; border: none; font-size: 14px; }
        input, select { background: #0a0e27; color: white; border: 1px solid #2a2f4a; }
        button { background: linear-gradient(135deg, #00b3a1, #008c7a); color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { transform: scale(1.02); opacity: 0.9; }
        button.put { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .balance { font-size: 28px; font-weight: bold; color: #00b3a1; text-align: center; }
        .tab { display: inline-block; padding: 10px 20px; cursor: pointer; background: #1a1f3a; border-radius: 10px 10px 0 0; }
        .tab.active { background: #00b3a1; }
        .tab-content { display: none; background: #1a1f3a; padding: 20px; border-radius: 0 10px 10px 10px; }
        .tab-content.active { display: block; }
        pre { background: #0a0e27; padding: 10px; border-radius: 8px; overflow-x: auto; font-size: 12px; }
        .order-item { background: #0a0e27; padding: 8px; margin: 5px 0; border-radius: 5px; font-size: 12px; }
        .status { display: flex; gap: 10px; justify-content: center; margin: 10px 0; }
        .connected { color: #00b3a1; }
        .disconnected { color: #e74c3c; }
        h1, h2 { margin: 0 0 15px 0; }
        hr { border-color: #2a2f4a; }
    </style>
</head>
<body>
<div class="container">
    <h1>🤖 Bot Deriv Pro</h1>
    
    <div class="card">
        <h3>🔌 Conexión</h3>
        <input type="text" id="appId" placeholder="App ID" value="1089">
        <input type="password" id="token" placeholder="Token API" size="40">
        <button onclick="conectar()">🔗 Conectar</button>
        <div id="status" class="status"></div>
        <div id="balanceDisplay" class="balance">💰 Saldo: --</div>
    </div>
    
    <div class="tabs">
        <span class="tab active" onclick="showTab('trade')">📊 Trading</span>
        <span class="tab" onclick="showTab('orders')">📜 Historial</span>
    </div>
    
    <div id="trade" class="tab-content active">
        <div class="card">
            <h3>📈 Nueva Orden</h3>
            <label>Símbolo:</label><br>
            <select id="symbol">
                <option value="R_100">R_100 (Índice)</option>
                <option value="R_50">R_50</option>
                <option value="R_10">R_10</option>
                <option value="1HZ10">Volatility 10 Index</option>
            </select><br>
            <label>Monto (USD):</label><br>
            <input type="number" id="amount" value="1" step="0.5" min="0.5"><br>
            <label>Duración (ticks):</label><br>
            <input type="number" id="duration" value="5" min="1" max="10"><br>
            <label>Tipo:</label><br>
            <button id="btnCall" onclick="comprar('CALL')" style="background:#00b3a1">📈 CALL (Sube)</button>
            <button id="btnPut" onclick="comprar('PUT')" class="put">📉 PUT (Baja)</button>
        </div>
    </div>
    
    <div id="orders" class="tab-content">
        <div class="card">
            <h3>📋 Últimas órdenes</h3>
            <div id="ordersList">No hay órdenes aún</div>
            <button onclick="cargarOrdenes()">🔄 Actualizar</button>
        </div>
    </div>
    
    <div class="card">
        <h3>📡 Logs</h3>
        <pre id="log">Esperando conexión...</pre>
    </div>
</div>

<script>
    let connected = false;
    
    async function conectar() {
        const token = document.getElementById('token').value;
        const appId = document.getElementById('appId').value;
        const res = await fetch('/api/connect', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, app_id: appId })
        });
        const data = await res.json();
        document.getElementById('log').innerText = JSON.stringify(data, null, 2);
        if (data.success) {
            connected = true;
            document.getElementById('status').innerHTML = '<span class="connected">✅ Conectado a Deriv</span>';
            actualizarSaldo();
            setInterval(actualizarSaldo, 5000);
        } else {
            document.getElementById('status').innerHTML = '<span class="disconnected">❌ Error de conexión</span>';
        }
    }
    
    async function comprar(type) {
        if (!connected) {
            alert('Conecta a Deriv primero');
            return;
        }
        const symbol = document.getElementById('symbol').value;
        const amount = parseFloat(document.getElementById('amount').value);
        const duration = parseInt(document.getElementById('duration').value);
        const res = await fetch('/api/buy', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ symbol, amount, duration, contract_type: type })
        });
        const data = await res.json();
        document.getElementById('log').innerText = JSON.stringify(data, null, 2);
        if (data.success) {
            setTimeout(() => { actualizarSaldo(); cargarOrdenes(); }, 1000);
        }
    }
    
    async function actualizarSaldo() {
        const res = await fetch('/api/balance');
        const data = await res.json();
        if (data.balance !== undefined) {
            document.getElementById('balanceDisplay').innerHTML = `💰 Saldo: $${data.balance.toFixed(2)}`;
        }
    }
    
    async function cargarOrdenes() {
        const res = await fetch('/api/orders');
        const data = await res.json();
        const ordersDiv = document.getElementById('ordersList');
        if (data.orders && data.orders.length > 0) {
            ordersDiv.innerHTML = data.orders.map(o => 
                `<div class="order-item">🕒 ${o.time} - ${o.price.substring(0, 50)}... - ${o.status}</div>`
            ).join('');
        } else {
            ordersDiv.innerHTML = 'No hay órdenes aún';
        }
    }
    
    function showTab(tabName) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        event.target.classList.add('active');
        if (tabName === 'orders') cargarOrdenes();
    }
</script>
</body>
</html>
