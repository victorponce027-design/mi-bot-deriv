<!DOCTYPE html>
<html>
<head>
    <title>Bot Deriv - Gráficos en Vivo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial; background: #0a0e27; color: white; padding: 20px; margin: 0; }
        .container { max-width: 1400px; margin: 0 auto; }
        .row { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; }
        .col { flex: 1; min-width: 300px; }
        .card { background: #1a1f3a; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card h3 { margin: 0 0 15px 0; color: #00b3a1; }
        input, select, button { padding: 12px; margin: 8px 5px; border-radius: 8px; border: none; font-size: 14px; }
        input, select { background: #0a0e27; color: white; border: 1px solid #2a2f4a; }
        button { background: linear-gradient(135deg, #00b3a1, #008c7a); color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { transform: scale(1.02); opacity: 0.9; }
        button.put { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .balance { font-size: 24px; font-weight: bold; color: #00b3a1; text-align: center; }
        .status { text-align: center; padding: 10px; }
        .connected { color: #00b3a1; }
        .disconnected { color: #e74c3c; }
        canvas { max-height: 300px; width: 100%; background: #0a0e27; border-radius: 10px; }
        .volatility-buttons { display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0; }
        .vol-btn { background: #2a2f4a; padding: 10px 15px; font-size: 12px; }
        .vol-btn.active { background: #00b3a1; }
        pre { background: #0a0e27; padding: 10px; border-radius: 8px; font-size: 11px; max-height: 150px; overflow-y: auto; }
        @media (max-width: 768px) {
            .row { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📈 Bot Deriv Pro + Gráficos</h1>
    
    <div class="row">
        <div class="col">
            <div class="card">
                <h3>🔌 Conexión</h3>
                <input type="text" id="appId" placeholder="App ID" value="1089">
                <input type="password" id="token" placeholder="Token API" size="40">
                <button onclick="conectar()">🔗 Conectar</button>
                <div id="status" class="status"></div>
                <div id="balanceDisplay" class="balance">💰 Saldo: --</div>
            </div>
        </div>
        
        <div class="col">
            <div class="card">
                <h3>📊 Volatilidad Activa</h3>
                <div class="volatility-buttons" id="volButtons">
                    <button class="vol-btn" data-symbol="R_10">Volatilidad 10</button>
                    <button class="vol-btn" data-symbol="R_25">Volatilidad 25</button>
                    <button class="vol-btn" data-symbol="R_50">Volatilidad 50</button>
                    <button class="vol-btn active" data-symbol="R_100">Volatilidad 100</button>
                    <button class="vol-btn" data-symbol="1HZ10">Volatility 1s</button>
                </div>
                <canvas id="priceChart" width="400" height="200"></canvas>
            </div>
        </div>
    </div>
    
    <div class="row">
        <div class="col">
            <div class="card">
                <h3>📈 Nueva Orden</h3>
                <label>Símbolo:</label><br>
                <select id="symbol">
                    <option value="R_10">Volatilidad 10</option>
                    <option value="R_25">Volatilidad 25</option>
                    <option value="R_50">Volatilidad 50</option>
                    <option value="R_100" selected>Volatilidad 100</option>
                    <option value="1HZ10">Volatility 1s Index</option>
                </select><br>
                <label>Monto (USD):</label><br>
                <input type="number" id="amount" value="1" step="0.5" min="0.5"><br>
                <label>Duración (ticks):</label><br>
                <input type="number" id="duration" value="5" min="1" max="10"><br>
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button id="btnCall" onclick="comprar('CALL')" style="flex:1">📈 CALL (Sube)</button>
                    <button id="btnPut" onclick="comprar('PUT')" class="put" style="flex:1">📉 PUT (Baja)</button>
                </div>
            </div>
        </div>
        
        <div class="col">
            <div class="card">
                <h3>📡 Logs</h3>
                <pre id="log">Esperando conexión...</pre>
            </div>
        </div>
    </div>
</div>

<script>
    let connected = false;
    let chart = null;
    let currentSymbol = 'R_100';
    
    // Configurar gráfico
    function initChart() {
        const ctx = document.getElementById('priceChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Precio',
                    data: [],
                    borderColor: '#00b3a1',
                    backgroundColor: 'rgba(0, 179, 161, 0.1)',
                    fill: true,
                    tension: 0.1,
                    pointRadius: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: { labels: { color: 'white' } },
                    tooltip: { mode: 'index', intersect: false }
                },
                scales: {
                    x: { ticks: { color: 'white', maxTicksLimit: 10 } },
                    y: { ticks: { color: 'white' } }
                }
            }
        });
    }
    
    // Actualizar gráfico con nuevos ticks
    function updateChart(ticks) {
        if (!chart || !ticks || ticks.length === 0) return;
        
        const labels = ticks.map(t => new Date(t.time).toLocaleTimeString());
        const prices = ticks.map(t => t.price);
        
        chart.data.labels = labels;
        chart.data.datasets[0].data = prices;
        chart.update();
    }
    
    // Cargar ticks del símbolo actual
    async function cargarTicks(symbol) {
        const res = await fetch(`/api/ticks/${symbol}`);
        const data = await res.json();
        if (data.ticks) {
            updateChart(data.ticks);
        }
    }
    
    // Suscribirse a ticks en tiempo real
    async function suscribirSimbolo(symbol) {
        currentSymbol = symbol;
        document.getElementById('symbol').value = symbol;
        
        // Actualizar botones visuales
        document.querySelectorAll('.vol-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.dataset.symbol === symbol) btn.classList.add('active');
        });
        
        if (connected) {
            await fetch('/api/subscribe', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ symbol })
            });
        }
        
        // Cargar ticks históricos
        await cargarTicks(symbol);
        
        // Iniciar polling cada 2 segundos
        if (window.tickInterval) clearInterval(window.tickInterval);
        window.tickInterval = setInterval(() => cargarTicks(symbol), 2000);
    }
    
    async function conectar() {
        const token = document.getElementById('token').value;
        const appId = document.getElementById('appId').value;
        
        if (!token) {
            alert('Ingresa tu token de API de Deriv');
            return;
        }
        
        const res = await fetch('/api/connect', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, app_id: appId })
        });
        const data = await res.json();
        document.getElementById('log').innerText = JSON.stringify(data, null, 2);
        
        if (data.success) {
            connected = true;
            document.getElementById('status').innerHTML = '<span class="connected">✅ Conectado a Deriv - ' + data.loginid + '</span>';
            actualizarSaldo();
            setInterval(actualizarSaldo, 5000);
            
            // Suscribirse al símbolo actual
            await suscribirSimbolo(currentSymbol);
        } else {
            connected = false;
            document.getElementById('status').innerHTML = '<span class="disconnected">❌ Error: ' + (data.error || 'Revisa tu token') + '</span>';
        }
    }
    
    async function comprar(type) {
        if (!connected) {
            alert('Conecta a Deriv primero');
            return;
        }
        
        const symbol = document.getElementById('symbol').value;
        const amount = parseFloat(document.getElementById('amount').value);
        const duration = parseInt(document.getElementById('duration').value);
        
        const res = await fetch('/api/buy', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ symbol, amount, duration, contract_type: type })
        });
        const data = await res.json();
        document.getElementById('log').innerText = JSON.stringify(data, null, 2);
        
        if (data.success) {
            setTimeout(() => actualizarSaldo(), 1000);
        }
    }
    
    async function actualizarSaldo() {
        const res = await fetch('/api/balance');
        const data = await res.json();
        if (data.balance !== undefined) {
            document.getElementById('balanceDisplay').innerHTML = `💰 Saldo: $${data.balance.toFixed(2)}`;
        }
    }
    
    // Inicializar al cargar
    initChart();
    
    // Configurar botones de volatilidad
    document.querySelectorAll('.vol-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const symbol = btn.dataset.symbol;
            suscribirSimbolo(symbol);
        });
    });
    
    // Sincronizar selector manual
    document.getElementById('symbol').addEventListener('change', (e) => {
        suscribirSimbolo(e.target.value);
    });
</script>
</body>
</html>
